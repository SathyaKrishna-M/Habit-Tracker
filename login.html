<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — HabitTracker</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-theme="dark">

<div class="login-page">
  <div class="login-card" id="loginCard">
    <div class="login-logo">⚡</div>
    <h1>HabitTracker</h1>
    <p>Sign in to continue building your best self.</p>

    <form class="login-form" id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username" autocomplete="username">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
          <button type="button" class="toggle-pw" id="togglePassword" aria-label="Toggle password visibility">👁️</button>
        </div>
      </div>

      <div class="login-error" id="loginError"></div>

      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
        Sign In →
      </button>
    </form>

    <p class="login-hint">Demo credentials: <strong>demo</strong> / <strong>demo</strong></p>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
