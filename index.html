<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — HabitTracker</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-theme="dark">

<div class="app-shell">
  <nav id="navbar"></nav>

  <main class="main-content">
    <div class="page-header">
      <h1 id="greeting">Good morning! 👋</h1>
      <p id="dateLabel">Loading...</p>
    </div>

    <!-- XP / Level -->
    <div class="card xp-card" id="xpCard" style="margin-bottom:1.5rem;">
      <div class="level-badge" id="levelBadge">🌱</div>
      <div class="xp-info">
        <div class="xp-level" id="xpLevel">Beginner</div>
        <div class="xp-label" id="xpLabel">0 / 100 XP to next level</div>
        <div class="xp-bar-wrap"><div class="xp-bar" id="xpBar" style="width:0%"></div></div>
        <div class="xp-numbers" id="xpNumbers">Total XP: 0 · Completions: 0</div>
      </div>
    </div>

    <!-- Today's Progress -->
    <div class="card" style="margin-bottom:1.5rem;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;">
        <h2 style="font-size:1rem;font-weight:700;">Today's Progress</h2>
        <span id="progressText" style="font-size:0.85rem;font-weight:600;color:var(--primary);">0% completed</span>
      </div>
      <div class="progress-container"><div class="progress-fill" id="progressBar" style="width:0%"></div></div>
      <p id="progressSub" style="font-size:0.8rem;color:var(--text2);margin-top:0.5rem;">0 of 0 habits done today</p>
    </div>

    <!-- Habit List -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <h2 style="font-size:1.1rem;font-weight:700;">Your Habits</h2>
      <a href="add.html" class="btn btn-primary" style="padding:0.5rem 1rem;font-size:0.85rem;">+ Add Habit</a>
    </div>

    <!-- Filter Tabs -->
    <div id="filterTabs" style="display:flex;gap:0.5rem;margin-bottom:1rem;flex-wrap:wrap;"></div>

    <div id="habitList" class="habit-list"></div>

    <div id="emptyState" class="empty-state" style="display:none;">
      <div class="empty-icon">🎯</div>
      <h3>No habits yet</h3>
      <p>Start building better habits. <a href="add.html">Add your first habit →</a></p>
    </div>
  </main>
</div>

<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/script.js"></script>
</body>
</html>
